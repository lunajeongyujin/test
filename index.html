<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Novelis Asia Leadership Summit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scroll-hint">DRAG HORIZONTALLY</div>
  <main class="track" id="track">
    <section class="panel hero-panel">
      <img src="assets/hero.png" class="hero-image" alt="Lead Together" />
    </section>

    <section class="panel sticker-panel">
      <img class="sticker-bg-image" src="assets/sticker-bg-new.jpg" alt="Lead Together background" />
      <img class="sticker s1" src="assets/sticker1.png" alt="Hidden Terminator sticker" />
      <img class="sticker s2" src="assets/sticker2.png" alt="Poker Face sticker" />
      <img class="sticker s3" src="assets/sticker3.png" alt="Spurt King sticker" />
      <img class="sticker s4" src="assets/sticker4.png" alt="Team Pillar sticker" />
      <img class="sticker s5" src="assets/sticker5.png" alt="Human Vitamin sticker" />
      <img class="sticker s6" src="assets/sticker6.png" alt="Pace Setter sticker" />
      <img class="sticker s7" src="assets/sticker7.png" alt="Human Engine sticker" />
      <img class="sticker s8" src="assets/sticker8.png" alt="Mental Coach sticker" />
    </section>

    <section class="panel gift-panel" id="giftPanel">
      <div class="burst burst-1"></div>
      <div class="burst burst-2"></div>
      <div class="burst burst-3"></div>
      <img class="product cap" src="assets/cap.png" alt="Novelis cap" />
      <img class="product shirt" src="assets/shirt.png" alt="Novelis t-shirt" />
      <img class="product wine" src="assets/wine.png" alt="Novelis wine" />
      <img class="product badge" src="assets/badge.png" alt="Novelis name badge" />
      <img class="bag" src="assets/bag.png" alt="Novelis bag" />
    </section>



    <section class="panel svg-panel">
      <img class="svg-page-image" src="assets/new-page.svg" alt="Additional Novelis page" />
    </section>


    <section class="panel sequence-panel" id="sequencePanel">
      <img class="sequence-image" id="sequenceImage" src="assets/click-1.svg" alt="Interactive Novelis page" />
      <button class="sequence-hit" id="sequenceHit" type="button" aria-label="Change page image"></button>
    </section>



    <section class="panel sequence6-panel" id="sequence6Panel">
      <img class="sequence6-image" id="sequence6Image" src="assets/step6-1.svg" alt="Interactive Novelis sequence page" />
      <button class="sequence6-hit" id="sequence6Hit" type="button" aria-label="Change sequence page image"></button>
    </section>


    <section class="panel sequence7-panel" id="sequence7Panel">
      <img class="sequence7-image" id="sequence7Image" src="assets/step7-1.svg" alt="Interactive Novelis sequence page 7" />
      <button class="sequence7-hit" id="sequence7Hit" type="button" aria-label="Change sequence page 7 image"></button>
    </section>


    <section class="panel page8-panel">
      <img class="page8-image" src="assets/page8.svg" alt="Novelis page 8" />
    </section>

    <section class="panel character-panel">
      <video class="character-video" autoplay muted loop playsinline preload="auto" poster="assets/character.jpg">
        <source src="assets/character-motion.mp4" type="video/mp4" />
      </video>
    </section>


    <section class="panel video-panel">
      <div class="video-wrap">
        <video class="final-video" preload="metadata" playsinline poster="assets/hero.png">
          <source src="assets/final-video.mp4" type="video/mp4" />
        </video>
        <button class="play-button" type="button" aria-label="Play video">
          <span></span>
        </button>
      </div>
    </section>

  </main>
  <script src="script.js"></script>
</body>
</html>
